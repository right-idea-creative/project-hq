<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Life HQ</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css" rel="stylesheet" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page: #ffffff;
    --bg-surface: #f5f5f5;
    --bg-card: #ffffff;
    --text-1: #111111;
    --text-2: #555555;
    --text-3: #9a9a9a;
    --border: rgba(0,0,0,0.10);
    --border-2: rgba(0,0,0,0.20);
    --radius: 12px;
    --radius-md: 8px;
    /* category / type colors retained for distinction */
    --trip: #1f6feb;
    --milestone: #d97706;
    /* urgency strip ramp: light grey -> near-black as urgency climbs */
    --urg-min: #d8d8d8;
    --urg-max: #111111;
    --font-display: "Space Grotesk", -apple-system, system-ui, sans-serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-body);
    background: var(--bg-page);
    color: var(--text-1);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  h1 { font-family: var(--font-display); font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 1.25rem; color: var(--text-1); }

  .tabs { display:flex; gap:2px; align-items:flex-end; padding-left:6px; position:relative; z-index:2; }
  .tab { display:flex; align-items:center; gap:6px; font-size:13px; padding:8px 16px; border:0.5px solid var(--border); border-bottom:none; border-radius:8px 8px 0 0; cursor:pointer; color:var(--text-2); background:var(--bg-surface); position:relative; top:0.5px; user-select:none; }
  .tab.active { background:var(--bg-card); color:var(--text-1); margin-bottom:-0.5px; padding-bottom:9px; }
  .tab:not(.active):hover { color:var(--text-1); }

  .panel { background:var(--bg-card); border:0.5px solid var(--border); border-radius:0 var(--radius) var(--radius) var(--radius); padding:1rem; position:relative; z-index:1; min-height:200px; }

  .fld { display:flex; flex-direction:column; gap:4px; }
  .fld label { font-size:11px; color:var(--text-3); padding-left:2px; }
  input, select { height:36px; padding:0 10px; font-size:14px; border:0.5px solid var(--border-2); border-radius:var(--radius-md); background:var(--bg-card); color:var(--text-1); font-family:inherit; }
  input:focus, select:focus { outline:none; box-shadow:0 0 0 2px rgba(55,138,221,0.35); }
  button { height:36px; padding:0 14px; font-size:14px; border:0.5px solid var(--border-2); border-radius:var(--radius-md); background:var(--bg-card); color:var(--text-1); cursor:pointer; font-family:inherit; display:flex; align-items:center; }
  button:hover { background:var(--bg-surface); }
  button:active { transform:scale(0.98); }

  .card { background:var(--bg-card); border:0.5px solid var(--border); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; }
  .row { display:flex; align-items:stretch; cursor:pointer; }
  .accent { width:6px; flex-shrink:0; }
  .accent.pulse { animation:urgpulse 1.15s ease-in-out infinite; }
  @keyframes urgpulse { 0%,100% { opacity:1; } 50% { opacity:0.28; } }
  @media (prefers-reduced-motion: reduce) { .accent.pulse { animation:none; } }
  .rowbody { display:flex; align-items:center; gap:14px; padding:12px 14px; flex:1; min-width:0; }
  .check { width:20px; height:20px; border-radius:50%; border:1.5px solid var(--border-2); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; background:transparent; transition:all .12s; }
  .check:hover { border-color:var(--text-1); }
  .typeicon { width:20px; height:20px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .title { font-size:15px; color:var(--text-1); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pill { font-size:11px; padding:2px 9px; border-radius:999px; flex-shrink:0; white-space:nowrap; }
  /* importance: 5 dots, filled left-to-right */
  .imp { display:flex; gap:3px; flex-shrink:0; align-items:center; }
  .imp .dot { width:6px; height:6px; border-radius:50%; background:var(--border); }
  .imp .dot.on { background:var(--text-1); }
  .span { font-size:12px; color:var(--text-2); flex-shrink:0; white-space:nowrap; }
  .span .cd { color:var(--text-3); }
  .chev { flex-shrink:0; font-size:16px; color:var(--text-3); transition:transform .15s; }
  .expand { padding:0 16px 0 38px; max-height:0; overflow:hidden; transition:max-height .2s ease, padding .2s ease; }
  .expand.open { max-height:400px; padding:0 16px 14px 38px; }
  .bodytext { font-size:14px; line-height:1.6; color:var(--text-2); border-top:0.5px solid var(--border); padding-top:12px; white-space:pre-wrap; }
  .bodytext.empty { color:var(--text-3); font-style:italic; }

  .donetoggle { width:100%; justify-content:space-between; margin-top:12px; }
  .donetoggle .cnt { color:var(--text-3); }
  .donerow { display:flex; align-items:center; gap:12px; padding:8px 14px; font-size:13px; color:var(--text-3); }
  .donerow .check { border-color:var(--text-3); background:var(--text-3); }
  .donerow .title { font-size:13px; text-decoration:line-through; color:var(--text-3); }
  .donerow .time { margin-left:auto; font-size:11px; color:var(--text-3); }

  .state { text-align:center; padding:2.5rem 1rem; color:var(--text-3); font-size:14px; }
  .placeholder { text-align:center; padding:3rem 1rem; color:var(--text-3); }
  .placeholder i { font-size:32px; display:block; margin-bottom:10px; }

  /* ---- toolbar: New button + filters ---- */
  .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
  .btn-new { height:36px; padding:0 16px; font-family:var(--font-body); font-size:14px; font-weight:500;
    border:0.5px solid var(--text-1); border-radius:var(--radius-md); background:var(--text-1); color:#fff;
    cursor:pointer; display:flex; align-items:center; gap:6px; }
  .btn-new:hover { background:#000; }
  .btn-new:active { transform:scale(0.98); }
  .filters { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-left:auto; }
  .filtergroup { display:flex; gap:4px; }
  .chip { height:28px; padding:0 11px; font-size:12px; border:0.5px solid var(--border-2); border-radius:999px;
    background:transparent; color:var(--text-2); cursor:pointer; display:flex; align-items:center; gap:5px; white-space:nowrap; }
  .chip:hover { border-color:var(--text-2); color:var(--text-1); }
  .chip.active { background:var(--text-1); color:#fff; border-color:var(--text-1); }
  .chip .cdot { width:8px; height:8px; border-radius:50%; flex:none; }
  .filtersep { width:0.5px; height:18px; background:var(--border-2); margin:0 2px; }

  /* row edit affordance */
  .editbtn { flex-shrink:0; width:24px; height:24px; border:none; background:transparent; color:var(--text-3);
    cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; opacity:0; transition:opacity .12s; border-radius:6px; }
  .card:hover .editbtn { opacity:1; }
  .editbtn:hover { background:var(--bg-surface); color:var(--text-1); }

  /* ---- modal ---- */
  .modal-scrim { position:fixed; inset:0; background:rgba(0,0,0,0.32); z-index:50; display:none;
    align-items:flex-start; justify-content:center; padding:8vh 1rem 2rem; }
  .modal-scrim.open { display:flex; }
  .modal { background:var(--bg-card); border:0.5px solid var(--border-2); border-radius:14px; width:100%; max-width:440px;
    box-shadow:0 12px 40px rgba(0,0,0,0.18); overflow:hidden; }
  .modal-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px 0; }
  .modal-head h2 { font-family:var(--font-display); font-size:17px; font-weight:600; margin:0; }
  .modal-x { width:30px; height:30px; border:none; background:transparent; color:var(--text-3); cursor:pointer;
    border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .modal-x:hover { background:var(--bg-surface); color:var(--text-1); }
  .modal-body { padding:14px 18px 18px; display:flex; flex-direction:column; gap:12px; }
  .modal-body .fld { display:flex; flex-direction:column; gap:5px; }
  .modal-body .fld label { font-size:11px; color:var(--text-3); padding-left:2px; }
  .modal-body input, .modal-body select, .modal-body textarea { width:100%; }
  .modal-body textarea { min-height:60px; padding:8px 10px; font-size:14px; font-family:inherit;
    border:0.5px solid var(--border-2); border-radius:var(--radius-md); resize:vertical; color:var(--text-1); background:var(--bg-card); }
  .modal-body textarea:focus { outline:none; box-shadow:0 0 0 2px rgba(0,0,0,0.18); }
  .modal-row { display:flex; gap:10px; }
  .modal-row .fld { flex:1; }
  /* segmented type picker */
  .typeseg { display:flex; gap:0; border:0.5px solid var(--border-2); border-radius:var(--radius-md); overflow:hidden; }
  .typeseg button { flex:1; height:38px; border:none; border-right:0.5px solid var(--border-2); background:var(--bg-card);
    font-family:inherit; font-size:12px; color:var(--text-2); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .typeseg button:last-child { border-right:none; }
  .typeseg button i { font-size:15px; }
  .typeseg button.active { background:var(--text-1); color:#fff; }
  .modal-foot { display:flex; justify-content:flex-end; gap:8px; padding-top:4px; }
  .modal-foot button { height:38px; padding:0 18px; font-family:inherit; font-size:14px; font-weight:500;
    border-radius:var(--radius-md); cursor:pointer; border:0.5px solid var(--border-2); }
  .btn-cancel { background:var(--bg-card); color:var(--text-2); }
  .btn-cancel:hover { background:var(--bg-surface); }
  .btn-save { background:var(--text-1); color:#fff; border-color:var(--text-1); }
  .btn-save:hover { background:#000; }
  .btn-save:disabled { opacity:0.5; cursor:default; }
  @media (max-width:480px){ .modal-row { flex-direction:column; } }
  /* ---- Clusters / Periphery Monitor ---- */
  #orbit-wrap { position:relative; width:100%; height:72vh; min-height:460px;
    background:var(--bg-card); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  /* break out of the 760px column so the monitor has room */
  #panel-clusters { margin-left:calc(-1*max(0px,(100vw - 760px)/2 - 1.25rem)); margin-right:calc(-1*max(0px,(100vw - 760px)/2 - 1.25rem)); }
  #orbit-canvas { position:absolute; inset:0; display:block; cursor:grab; }
  #orbit-canvas.drag { cursor:grabbing; }
  #orbit-controls { position:absolute; top:12px; right:12px; display:flex; flex-direction:column; gap:6px; z-index:3; }
  #orbit-controls button { width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    background:var(--bg-card); border:0.5px solid var(--border-2); border-radius:var(--radius-md); cursor:pointer; color:var(--text-2); font-size:16px; }
  #orbit-controls button:hover { color:var(--text-1); background:var(--bg-surface); }
  #orbit-legend { position:absolute; bottom:12px; right:12px; z-index:3; background:rgba(255,255,255,.85);
    border:0.5px solid var(--border); border-radius:var(--radius-md); padding:9px 11px; max-width:240px; backdrop-filter:blur(6px);
    font-size:11px; color:var(--text-2); display:flex; flex-direction:column; gap:7px; }
  #orbit-legend .grp { font-size:9px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:3px; }
  #orbit-legend .row { display:flex; flex-wrap:wrap; gap:5px 9px; }
  #orbit-legend .chip { display:flex; align-items:center; gap:4px; }
  #orbit-legend .sw { width:11px; height:11px; border-radius:50%; flex:none; }
  #orbit-tip { position:absolute; z-index:5; background:var(--bg-card); border:0.5px solid var(--border-2);
    border-radius:var(--radius-md); padding:8px 10px; font-size:12px; max-width:220px; pointer-events:none; opacity:0;
    transition:opacity .12s; box-shadow:0 6px 20px rgba(0,0,0,.12); }
  #orbit-tip .tt-title { font-weight:500; margin-bottom:2px; color:var(--text-1); }
  #orbit-tip .tt-meta { color:var(--text-2); font-size:11px; line-height:1.5; }
  #orbit-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:0 2rem; color:var(--text-3); font-size:14px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Life HQ</h1>

  <div class="tabs">
    <div class="tab active" data-tab="list"><i class="ti ti-list-check"></i>List</div>
    <div class="tab" data-tab="notes"><i class="ti ti-note"></i>Notes</div>
    <div class="tab" data-tab="clusters"><i class="ti ti-affiliate"></i>Clusters</div>
    <div class="tab" data-tab="agent"><i class="ti ti-sparkles"></i>Agent</div>
  </div>

  <div class="panel">
    <div id="panel-list">
      <div class="toolbar">
        <button class="btn-new" id="open-add"><i class="ti ti-plus"></i>New</button>
        <div class="filters">
          <div class="filtergroup" id="type-filters">
            <button class="chip active" data-tf="all">All</button>
            <button class="chip" data-tf="task"><i class="ti ti-circle"></i>Tasks</button>
            <button class="chip" data-tf="initiative"><i class="ti ti-target"></i>Initiatives</button>
            <button class="chip" data-tf="trip"><i class="ti ti-plane-tilt"></i>Trips</button>
            <button class="chip" data-tf="milestone"><i class="ti ti-flag"></i>Milestones</button>
          </div>
          <div class="filtersep"></div>
          <div class="filtergroup" id="cat-filters"></div>
        </div>
      </div>

      <div id="open-list"><div class="state">Loading…</div></div>

      <button class="donetoggle" id="done-toggle" style="display:none;">
        <span><i class="ti ti-chevron-right" id="done-chev" style="vertical-align:-2px; margin-right:6px;"></i>Done <span class="cnt" id="done-count"></span></span>
      </button>
      <div id="done-list" style="display:none; margin-top:6px;"></div>
    </div>

    <div class="modal-scrim" id="modal-scrim">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <h2 id="modal-title">New item</h2>
          <button class="modal-x" id="modal-close" aria-label="Close"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
          <div class="fld">
            <label for="m-title">Title</label>
            <input id="m-title" type="text" placeholder="What is it?" />
          </div>
          <div class="fld">
            <label>Type</label>
            <div class="typeseg" id="m-typeseg">
              <button data-type="task" class="active"><i class="ti ti-circle"></i>Task</button>
              <button data-type="initiative"><i class="ti ti-target"></i>Initiative</button>
              <button data-type="trip"><i class="ti ti-plane-tilt"></i>Trip</button>
              <button data-type="milestone"><i class="ti ti-flag"></i>Milestone</button>
            </div>
          </div>
          <div class="modal-row">
            <div class="fld">
              <label for="m-cat">Category</label>
              <select id="m-cat">
                <option value="">None</option>
                <option value="finance">Finance</option>
                <option value="dogs">Dogs</option>
                <option value="projects">Projects</option>
                <option value="house">House</option>
                <option value="family">Friends &amp; family</option>
              </select>
            </div>
            <div class="fld" id="m-fld-imp">
              <label for="m-imp">Importance</label>
              <select id="m-imp">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </div>
          </div>
          <div class="modal-row">
            <div class="fld" id="m-fld-due">
              <label for="m-due" id="m-lbl-due">Due</label>
              <input id="m-due" type="date" />
            </div>
            <div class="fld" id="m-fld-end" style="display:none;">
              <label for="m-end">End</label>
              <input id="m-end" type="date" />
            </div>
          </div>
          <div class="fld">
            <label for="m-body">Notes</label>
            <textarea id="m-body" placeholder="Optional details…"></textarea>
          </div>
          <div class="modal-foot">
            <button class="btn-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-save" id="modal-save">Add item</button>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-notes" style="display:none;">
      <div class="placeholder"><i class="ti ti-note"></i>Notes — text items from the same table. Coming later.</div>
    </div>
    <div id="panel-clusters" style="display:none;">
      <div id="orbit-wrap">
        <canvas id="orbit-canvas"></canvas>
        <div id="orbit-controls">
          <button data-orbit="in" title="Zoom in"><i class="ti ti-plus"></i></button>
          <button data-orbit="out" title="Zoom out"><i class="ti ti-minus"></i></button>
          <button data-orbit="fit" title="Fit"><i class="ti ti-focus-centered"></i></button>
        </div>
        <div id="orbit-legend"></div>
        <div id="orbit-tip"></div>
        <div id="orbit-empty" style="display:none;">Nothing in orbit yet — add items with a due date, or leave them undated to park them in the holding ring.</div>
      </div>
    </div>
    <div id="panel-agent" style="display:none;">
      <div class="placeholder"><i class="ti ti-sparkles"></i>Agent — reads your tasks + the team's. The point of all this.</div>
    </div>
  </div>
</div>

<script>
const CATS = {
  finance:  { fill:'#E1F5EE', text:'#0F6E56' },
  dogs:     { fill:'#FAEEDA', text:'#854F0B' },
  projects: { fill:'#EEEDFE', text:'#3C3489' },
  house:    { fill:'#FBEAF0', text:'#72243E' },
  family:   { fill:'#FCEBEB', text:'#791F1F' },
};
const CATLABEL = { finance:'Finance', dogs:'Dogs', projects:'Projects', house:'House', family:'Friends & family' };
const DAY = 86400000;

let items = [];     // open items, rendered in the list
let doneItems = []; // status = 'done', rendered in the collapsed section
let openId = null;

function today0() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s) { if (!s) return null; const d = new Date(s); d.setHours(0,0,0,0); return d; }
function daysLeft(d) { if (!d) return null; return Math.round((d - today0()) / DAY); }
function fmt(d) { return d ? d.toLocaleDateString([], { month:'short', day:'numeric' }) : ''; }
function isoToday(offset) { const d = new Date(today0().getTime() + (offset||0)*DAY); return d.toISOString().slice(0,10); }

// urgency comes back as a STRING ("5.00") or null — parse before use
function urg(it) { return it.urgency == null ? null : parseFloat(it.urgency); }
function maxUrg() { let m = 0; items.forEach(it => { const u = urg(it); if (u != null && u > m) m = u; }); return m || 1; }

function ring(imp) {
  // importance as 5 dots, filled left-to-right; empty slot keeps width stable
  if (imp == null) return '<div style="width:48px;flex-shrink:0;"></div>';
  const n = Math.max(0, Math.min(5, Math.round(imp)));
  let dots = '';
  for (let i = 1; i <= 5; i++) dots += '<span class="dot'+(i <= n ? ' on' : '')+'"></span>';
  return '<div class="imp" aria-label="importance '+n+' of 5">'+dots+'</div>';
}
function pill(cat) {
  if (!cat || !CATS[cat]) return '<span style="width:0;"></span>';
  const c = CATS[cat];
  return '<span class="pill" style="background:'+c.fill+';color:'+c.text+';">'+(CATLABEL[cat]||cat)+'</span>';
}
function leftControl(it) {
  if (it.type === 'task') return '<div class="check" data-id="'+it.id+'"></div>';
  if (it.type === 'initiative') return '<div class="check" data-id="'+it.id+'"></div>';
  if (it.type === 'trip') return '<div class="typeicon" style="color:var(--trip);"><i class="ti ti-plane-tilt"></i></div>';
  if (it.type === 'milestone') return '<div class="typeicon" style="color:var(--milestone);"><i class="ti ti-flag"></i></div>';
  return '<div style="width:20px;flex-shrink:0;"></div>';
}
function rightControl(it, mx) {
  if (it.type === 'trip') {
    const s = parseDate(it.start_date), e = parseDate(it.due_date);
    const dl = daysLeft(s);
    const cd = dl == null ? '' : (dl > 0 ? 'in '+dl+'d' : (dl === 0 ? 'today' : 'now'));
    return '<span class="span"><span class="cd">'+cd+'</span> · '+fmt(s)+(e ? ' – '+fmt(e) : '')+'</span>';
  }
  if (it.type === 'milestone') {
    const d = parseDate(it.due_date), dl = daysLeft(d);
    const cd = dl == null ? '' : (dl > 0 ? 'in '+dl+'d' : (dl === 0 ? 'today' : 'passed'));
    return '<span class="span"><span class="cd">'+cd+'</span> · '+fmt(d)+'</span>';
  }
  // tasks: urgency now lives entirely in the left strip
  return '';
}
// blend light grey -> near-black by urgency fraction; returns {color, pulse}
function urgencyStrip(it, mx) {
  const u = urg(it);
  if (u == null) return { color: 'var(--border)', pulse: false };
  const f = Math.max(0, Math.min(1, u / mx));
  // lerp #d8d8d8 (216) -> #111111 (17)
  const v = Math.round(216 + (17 - 216) * f);
  const hex = v.toString(16).padStart(2, '0');
  return { color: '#'+hex+hex+hex, pulse: f >= 0.999 };
}
function accentColor(it, mx) {
  if (it.type === 'trip') return 'var(--trip)';
  if (it.type === 'milestone') return 'var(--milestone)';
  return urgencyStrip(it, mx).color;
}
function cardBg(it) {
  return 'var(--bg-card)';
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render() {
  const mx = maxUrg();
  const ol = document.getElementById('open-list');
  const shown = items.filter(passesFilter);
  if (!shown.length) {
    ol.innerHTML = '<div class="state">'+(items.length ? 'Nothing matches these filters.' : 'No open items.')+'</div>';
  } else {
    ol.innerHTML = '';
    shown.forEach(it => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.background = cardBg(it);
      const useTaskUI = (it.type === 'task' || it.type === 'initiative');
      const impSlot = useTaskUI ? ring(it.importance) : '<div style="width:48px;flex-shrink:0;"></div>';
      const isOpen = openId === it.id;
      const strip = useTaskUI ? urgencyStrip(it, mx) : { color: accentColor(it,mx), pulse:false };
      const bodyHtml = (it.body && it.body.trim())
        ? '<div class="bodytext">'+esc(it.body)+'</div>'
        : '<div class="bodytext empty">No description.</div>';
      card.innerHTML =
        '<div class="row" data-row="'+it.id+'">'+
          '<div class="accent'+(strip.pulse?' pulse':'')+'" style="background:'+strip.color+';"></div>'+
          '<div class="rowbody">'+
            leftControl(it)+
            '<span class="title">'+esc(it.title)+'</span>'+
            pill(it.category)+
            impSlot+
            rightControl(it,mx)+
            '<button class="editbtn" data-edit="'+it.id+'" aria-label="Edit"><i class="ti ti-pencil"></i></button>'+
            '<i class="ti ti-chevron-down chev" style="transform:rotate('+(isOpen?'180':'0')+'deg);"></i>'+
          '</div>'+
        '</div>'+
        '<div class="expand'+(isOpen?' open':'')+'">'+bodyHtml+'</div>';
      ol.appendChild(card);
    });
    ol.querySelectorAll('.row').forEach(row => {
      row.onclick = (e) => {
        if (e.target.closest('.check')) return;
        if (e.target.closest('.editbtn')) return;
        const id = row.dataset.row;
        openId = openId === id ? null : id;
        render();
      };
    });
    ol.querySelectorAll('.check').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); markDone(el.dataset.id); };
    });
    ol.querySelectorAll('.editbtn').forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); openEdit(el.dataset.edit); };
    });
  }
  renderDone();
}

function renderDone() {
  const toggle = document.getElementById('done-toggle');
  const list = document.getElementById('done-list');
  if (!doneItems.length) { toggle.style.display = 'none'; list.style.display = 'none'; return; }
  toggle.style.display = 'flex';
  document.getElementById('done-count').textContent = '('+doneItems.length+')';
  list.innerHTML = '';
  doneItems.forEach(it => {
    const t = it.completed_at ? new Date(it.completed_at).toLocaleTimeString([], { hour:'numeric', minute:'2-digit' }) : '';
    const row = document.createElement('div');
    row.className = 'donerow';
    row.innerHTML =
      '<div class="check"><i class="ti ti-check" style="font-size:13px;color:var(--bg-card);"></i></div>'+
      '<span class="title">'+esc(it.title)+'</span>'+
      '<span class="time">'+t+'</span>';
    list.appendChild(row);
  });
}

// optimistic: move the card now, fire the write, reconcile (or roll back) after.
function markDone(id) {
  const i = items.findIndex(it => it.id === id);
  if (i < 0) return;
  const it = items.splice(i, 1)[0];
  it.status = 'done';
  it.completed_at = new Date().toISOString();
  doneItems.unshift(it);
  if (openId === id) openId = null;
  render();
  fetch('/api/tasks', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  })
    .then(async res => { if (!res.ok) throw new Error((await res.json()).error || res.status); })
    .then(() => load())   // reconcile with server truth
    .catch(err => {
      // roll back the optimistic move
      const j = doneItems.findIndex(d => d.id === id);
      if (j >= 0) { const back = doneItems.splice(j, 1)[0]; back.status = 'open'; back.completed_at = null; items.unshift(back); }
      render();
      alert('Could not complete: ' + (err.message || err));
    });
}

// ===========================================================================
// Periphery Monitor (Clusters tab). Reads /api/orbit.
// Distance = time · size = importance · color+icon = category · shape = type.
// Focus items (type='focus') render as enclosing arcs that redden with neglect.
// ===========================================================================
const Orbit = (() => {
  // --- category map: keyed to YOUR add-form categories (line ~116-120).
  // Edit colors here; `icon` is a Tabler class suffix — the real glyph is read
  // from the loaded webfont at runtime (no fragile codepoints). Unknown -> gray.
  const AREAS = {
    finance:  { color:'#1d9e75', icon:'coin',    label:'Finance' },
    dogs:     { color:'#ba7517', icon:'dog',     label:'Dogs' },
    projects: { color:'#7f77dd', icon:'stack-2', label:'Projects' },
    house:    { color:'#3f7fd4', icon:'home',    label:'House' },
    family:   { color:'#d4537e', icon:'users',   label:'Family' },
  };
  const FALLBACK_ICON = 'point';
  // resolve Tabler class -> actual glyph char by reading the loaded font's ::before
  const _glyphCache = {};
  function glyph(name){
    if(_glyphCache[name]) return _glyphCache[name];
    const probe=document.createElement('i'); probe.className='ti ti-'+name;
    probe.style.cssText='position:absolute;left:-9999px;visibility:hidden';
    document.body.appendChild(probe);
    let ch=getComputedStyle(probe,'::before').content||'';
    document.body.removeChild(probe);
    ch=ch.replace(/^["']|["']$/g,'');
    if(!ch||ch==='none') return '';          // not ready yet — don't cache, retry next frame
    _glyphCache[name]=ch; return ch;
  }
  const ICON_FONT = '600 __PX__px "tabler-icons"';
  const GRAY = '#8a8880';
  const areaOf = it => AREAS[(it.category||'').toLowerCase()] || { color:GRAY, icon:FALLBACK_ICON, label:'Uncategorized' };

  const NEGLECT_FULL = 21;
  const R_MIN_NODE = 30, R_MAX_NODE = 62;
  const sizeOf = it => R_MIN_NODE + (R_MAX_NODE-R_MIN_NODE)*((Math.max(1,Math.min(10,it.importance||1))-1)/9);

  let cv, ctx, tipEl, legendEl, emptyEl;
  let W,H,CX,CY,DPR, R_MAX,R_DATELESS,R_FOCUS;
  let cam = {x:0,y:0,z:1};
  let DATA = [], N = {}, hoverId = null, started = false, raf = null;

  const hexA = (hex,a) => { const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };
  const w2s = (x,y) => [(x-cam.x)*cam.z+CX, (y-cam.y)*cam.z+CY];
  const s2w = (sx,sy) => [(sx-CX)/cam.z+cam.x, (sy-CY)/cam.z+cam.y];
  const daysLeft = it => (it.days_left==null ? null : Math.max(0, Math.round(+it.days_left)));

  function resize(){
    DPR = window.devicePixelRatio||1;
    const rect = cv.getBoundingClientRect();
    W = rect.width; H = rect.height;
    cv.width = W*DPR; cv.height = H*DPR; CX = W/2; CY = H/2;
    const base = 2000;
    R_MAX = base*0.34; R_DATELESS = base*0.40; R_FOCUS = base*0.46;
    fit();
  }
  function fit(){ const want = R_FOCUS*2 + 260; cam.z = Math.min(W,H)/want; cam.x = 0; cam.y = 0; }
  function radiusForDays(d){ const span = R_DATELESS - R_MAX*0.14; return R_MAX*0.14 + span*Math.min(1, d/120); }

  function place(){
    const dated = DATA.filter(d=>d.kind==='finite' && daysLeft(d)!=null);
    const dateless = DATA.filter(d=>d.kind==='finite' && daysLeft(d)==null);
    const all = [...dated,...dateless];
    all.forEach((it,i)=>{
      if(!N[it.id]) N[it.id] = { a:(i/Math.max(1,all.length))*Math.PI*2 - Math.PI/2, born:performance.now() };
      N[it.id].rad = sizeOf(it);
      N[it.id]._tr = daysLeft(it)!=null ? radiusForDays(daysLeft(it)) : R_DATELESS;
      if(daysLeft(it)!=null) N[it.id]._tr -= ((it.importance||1)/10)*14;
    });
    dated.forEach(it=>{ if(it.parent_id && N[it.parent_id]){ let da=Math.atan2(Math.sin(N[it.parent_id].a-N[it.id].a),Math.cos(N[it.parent_id].a-N[it.id].a)); N[it.id].a+=da*.5; }});
    all.forEach(it=>{ const n=N[it.id]; n.x=Math.cos(n.a)*n._tr; n.y=Math.sin(n.a)*n._tr; });
    for(let iter=0;iter<140;iter++){
      let moved=false;
      for(let a=0;a<all.length;a++)for(let b=a+1;b<all.length;b++){
        const A=N[all[a].id],B=N[all[b].id];
        let dx=B.x-A.x,dy=B.y-A.y,dist=Math.hypot(dx,dy)||.01;
        const minD=A.rad+B.rad+22;
        if(dist<minD){ moved=true; const push=(minD-dist)/2,nx=dx/dist,ny=dy/dist; A.x-=nx*push;A.y-=ny*push;B.x+=nx*push;B.y+=ny*push; }
      }
      all.forEach(it=>{ const n=N[it.id]; const cr=Math.hypot(n.x,n.y)||.01; const diff=n._tr-cr; n.x+=(n.x/cr)*diff*0.18; n.y+=(n.y/cr)*diff*0.18; });
      if(!moved && iter>4) break;
    }
  }

  function drawNode(it){
    const n=N[it.id]; if(!n) return;
    const [sx,sy]=w2s(n.x,n.y); n._sx=sx; n._sy=sy;
    const A=areaOf(it), col=A.color, R=n.rad*cam.z;
    const dl=daysLeft(it), hot = dl!=null && dl<=2, dateless = dl==null;
    const appear=Math.min(1,(performance.now()-n.born)/450);
    ctx.globalAlpha=appear;
    ctx.beginPath(); ctx.arc(sx,sy,R,0,Math.PI*2);
    ctx.fillStyle = hexA(col, hot?0.26:0.12); ctx.fill();
    ctx.lineWidth=(hoverId===it.id)?3:2; ctx.strokeStyle=col;
    if(dateless) ctx.setLineDash([5,4]); else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
    if(it.type==='trip'){ ctx.beginPath(); ctx.arc(sx,sy,R-5,0,Math.PI*2); ctx.lineWidth=1.4; ctx.strokeStyle=hexA(col,.7); ctx.stroke(); }
    else if(it.type==='milestone'){ ctx.beginPath(); ctx.moveTo(sx,sy-R+5);ctx.lineTo(sx+R-5,sy);ctx.lineTo(sx,sy+R-5);ctx.lineTo(sx-R+5,sy);ctx.closePath(); ctx.lineWidth=1.4; ctx.strokeStyle=hexA(col,.7); ctx.stroke(); }
    // text inside
    const hasCd=(it.type==='trip'||it.type==='milestone') && R>22 && dl!=null;
    const fontPx=Math.max(9,Math.min(15,R*0.32));
    ctx.font=`500 ${fontPx}px -apple-system,sans-serif`;
    const maxW=R*1.5, words=(it.title||'').split(' ');
    let lines=[],cur='';
    for(const w of words){ const t=cur?cur+' '+w:w; if(ctx.measureText(t).width<=maxW||!cur)cur=t; else {lines.push(cur);cur=w;} }
    if(cur)lines.push(cur);
    if(lines.length>2){ lines=[lines[0],lines.slice(1).join(' ')]; let ln=lines[1]; while(ctx.measureText(ln+'…').width>maxW&&ln.length>1)ln=ln.slice(0,-1); lines[1]=ln+(ln.length<lines[1].length?'…':''); }
    const lineH=fontPx*1.05, showText=R>20;
    const iconY = showText ? sy-(lines.length*lineH)/2 - R*0.20 : sy;
    // Tabler icon glyph (resolved from loaded font)
    const iPx=Math.min(20, R*0.5);
    const gch=glyph(A.icon);
    if(gch){ ctx.fillStyle=col; ctx.font=ICON_FONT.replace('__PX__',iPx); ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(gch, sx, iconY); }
    if(showText){
      ctx.fillStyle=hexA('#2c2c2a',.95); ctx.font=`500 ${fontPx}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      const blockTop=sy+R*0.04; lines.forEach((ln,k)=>ctx.fillText(ln,sx,blockTop+k*lineH));
    }
    if(hasCd){ ctx.fillStyle=hexA(col,.95); ctx.font=`600 ${Math.max(9,fontPx*0.85)}px -apple-system,sans-serif`; ctx.fillText(dl+'d', sx, sy+R*0.74); }
    ctx.globalAlpha=1; ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  }

  function drawFocusArcs(){
    const fs = DATA.filter(d=>d.kind==='standing');
    if(!fs.length) return;
    const seg=(Math.PI*2)/fs.length, [cxS,cyS]=w2s(0,0), rF=R_FOCUS*cam.z;
    fs.forEach((it,i)=>{
      const ng=Math.max(0,Math.min(1, it.neglect==null?0:+it.neglect));
      const a0=-Math.PI/2+i*seg+0.025, a1=-Math.PI/2+(i+1)*seg-0.025;
      const calm=areaOf(it).color;
      const lineCol = ng>0.5 ? `rgba(216,90,48,${0.45+ng*0.5})` : hexA(calm,0.4+ng*0.4);
      ctx.beginPath(); ctx.arc(cxS,cyS,rF,a0,a1); ctx.lineWidth=(7+ng*9)*cam.z; ctx.strokeStyle=lineCol; ctx.lineCap='round'; ctx.stroke();
      const mid=(a0+a1)/2, lx=cxS+Math.cos(mid)*(rF+22*cam.z), ly=cyS+Math.sin(mid)*(rF+22*cam.z);
      ctx.fillStyle = ng>0.5 ? '#d85a30' : hexA(calm,.95); ctx.font=`500 ${13*Math.max(cam.z,.7)}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText((it.title||'')+(ng>0.6?'  !':''), lx, ly);
      it._arc={cxS,cyS,rF,a0,a1};
    });
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }

  function drawRings(){
    const [cxS,cyS]=w2s(0,0);
    [[7,'1 wk'],[30,'1 mo'],[90,'1 qtr']].forEach(([d,lbl])=>{
      const r=radiusForDays(d)*cam.z;
      ctx.beginPath(); ctx.arc(cxS,cyS,r,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.07)'; ctx.setLineDash([3,7]); ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='rgba(0,0,0,.2)'; ctx.font=`${11*Math.max(cam.z,.7)}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.fillText(lbl,cxS,cyS-r-5*cam.z);
    });
    const rd=R_DATELESS*cam.z;
    ctx.beginPath(); ctx.arc(cxS,cyS,rd,0,Math.PI*2); ctx.strokeStyle='rgba(0,0,0,.16)'; ctx.setLineDash([2,6]); ctx.lineWidth=1.2; ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,0,0,.32)'; ctx.font=`${11*Math.max(cam.z,.7)}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.fillText('unscheduled',cxS,cyS-rd-5*cam.z);
    ctx.beginPath(); ctx.arc(cxS,cyS,6*cam.z,0,Math.PI*2); ctx.fillStyle='#d85a30'; ctx.fill();
    ctx.fillStyle='var(--text-3)'; ctx.fillStyle='#97958c'; ctx.font=`${10*Math.max(cam.z,.7)}px -apple-system,sans-serif`; ctx.textAlign='center'; ctx.fillText('now',cxS,cyS+16*cam.z); ctx.textAlign='left';
  }

  function draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,W,H);
    drawRings();
    DATA.filter(d=>d.parent_id).forEach(it=>{ const p=N[it.parent_id],n=N[it.id]; if(p&&n){ const[px,py]=w2s(p.x,p.y),[x,y]=w2s(n.x,n.y); ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.strokeStyle=hexA(areaOf(it).color,.3); ctx.setLineDash([2,4]); ctx.lineWidth=1; ctx.stroke(); ctx.setLineDash([]); }});
    DATA.filter(d=>d.kind==='finite').forEach(drawNode);
    drawFocusArcs();
  }
  function frame(){ draw(); raf=requestAnimationFrame(frame); }

  function bind(){
    let dragging=false,last=null,didDrag=false;
    cv.addEventListener('mousedown',e=>{ dragging=true;didDrag=false;last=[e.clientX,e.clientY];cv.classList.add('drag'); });
    window.addEventListener('mouseup',()=>{ dragging=false;cv.classList.remove('drag'); });
    cv.addEventListener('mousemove',e=>{
      const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
      if(dragging){ const dx=e.clientX-last[0],dy=e.clientY-last[1]; if(Math.hypot(dx,dy)>3)didDrag=true; cam.x-=dx/cam.z;cam.y-=dy/cam.z;last=[e.clientX,e.clientY];tipEl.style.opacity=0;return; }
      let found=null; const fin=DATA.filter(d=>d.kind==='finite');
      for(let i=fin.length-1;i>=0;i--){ const it=fin[i],n=N[it.id]; if(!n||n._sx==null)continue; if(Math.hypot(mx-n._sx,my-n._sy)<=n.rad*cam.z+3){found=it;break;} }
      hoverId=found?found.id:null; cv.style.cursor=found?'pointer':'grab';
      if(found){ const n=N[found.id],dl=daysLeft(found);
        const meta = dl!=null ? `${found.type} · ${areaOf(found).label}<br>due in ${dl}d · importance ${found.importance||'—'}/10`
                              : `${found.type} · ${areaOf(found).label}<br>no date · holding ring`;
        tipEl.innerHTML=`<div class="tt-title">${esc(found.title||'')}</div><div class="tt-meta">${meta}</div>`;
        tipEl.style.left=Math.min(W-180,(n._sx+n.rad*cam.z+10))+'px'; tipEl.style.top=(n._sy-12)+'px'; tipEl.style.opacity=1;
      } else if(!dragging) tipEl.style.opacity=0;
    });
    cv.addEventListener('mouseleave',()=>{ tipEl.style.opacity=0; });
    cv.addEventListener('click',e=>{
      if(didDrag)return; const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
      const fin=DATA.filter(d=>d.kind==='finite');
      for(let i=fin.length-1;i>=0;i--){ const it=fin[i],n=N[it.id]; if(!n||n._sx==null)continue;
        if(Math.hypot(mx-n._sx,my-n._sy)<=n.rad*cam.z+3){ /* click finite node: hook to PATCH /api/tasks later */ return; } }
      // focus arc click: tend (UI hint only until write path exists)
    });
    cv.addEventListener('wheel',e=>{ e.preventDefault(); const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top; const [wx,wy]=s2w(mx,my); const f=e.deltaY<0?1.1:1/1.1; cam.z=Math.max(0.25,Math.min(3,cam.z*f)); const [nx,ny]=s2w(mx,my); cam.x+=wx-nx; cam.y+=wy-ny; }, {passive:false});
    document.querySelectorAll('#orbit-controls button').forEach(b=>{ b.onclick=()=>{ const k=b.dataset.orbit; if(k==='in')cam.z=Math.min(3,cam.z*1.2); else if(k==='out')cam.z=Math.max(0.25,cam.z/1.2); else fit(); }; });
    window.addEventListener('resize', ()=>{ if(document.getElementById('panel-clusters').style.display!=='none'){ resize(); place(); } });
  }

  function legend(){
    const areas = Object.values(AREAS).map(a=>`<span class="chip"><span class="sw" style="background:${hexA(a.color,.5)};border:1px solid ${a.color}"></span>${a.label}</span>`).join('');
    legendEl.innerHTML =
      `<div><div class="grp">Area — color</div><div class="row">${areas}<span class="chip"><span class="sw" style="background:${hexA(GRAY,.5)};border:1px solid ${GRAY}"></span>None</span></div></div>`+
      `<div><div class="grp">Size = importance · distance = time</div><div class="row"><span class="chip">dashed = unscheduled</span></div></div>`;
  }

  async function loadData(){
    try{
      const res = await fetch('/api/orbit');
      const data = await res.json();
      if(!Array.isArray(data)) throw new Error(data.error||'bad response');
      DATA = data;
      emptyEl.style.display = DATA.length ? 'none' : 'flex';
      place();
    }catch(err){
      emptyEl.style.display='flex';
      emptyEl.textContent = 'Couldn’t load orbit: '+String(err.message||err);
    }
  }

  function activate(){
    if(!started){
      cv=document.getElementById('orbit-canvas'); ctx=cv.getContext('2d');
      tipEl=document.getElementById('orbit-tip'); legendEl=document.getElementById('orbit-legend'); emptyEl=document.getElementById('orbit-empty');
      bind(); legend(); started=true; frame();
    }
    // panel just became visible: size now that it has dimensions
    requestAnimationFrame(()=>{ resize(); loadData(); });
  }

  return { activate };
})();


async function load() {
  try {
    const res = await fetch('/api/tasks');
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error(data.error || 'bad response');
    // id comes back as a STRING already; keep it as-is for comparisons
    items = data.filter(it => it.status !== 'done');
    doneItems = data.filter(it => it.status === 'done');
    render();
  } catch (err) {
    document.getElementById('open-list').innerHTML =
      '<div class="state">Couldn’t load tasks: '+esc(String(err.message||err))+'</div>';
  }
}

// ===========================================================================
// Filters — type + category, applied client-side to loaded items.
// ===========================================================================
let typeFilter = 'all';
const catFilter = new Set();  // empty = all categories

function passesFilter(it) {
  if (typeFilter !== 'all' && it.type !== typeFilter) return false;
  if (catFilter.size && !catFilter.has(it.category)) return false;
  return true;
}

// build category chips from CATS
(function buildCatFilters(){
  const wrap = document.getElementById('cat-filters');
  Object.keys(CATS).forEach(key => {
    const c = CATS[key];
    const b = document.createElement('button');
    b.className = 'chip';
    b.dataset.cf = key;
    b.innerHTML = '<span class="cdot" style="background:'+c.text+';"></span>'+(CATLABEL[key]||key);
    b.onclick = () => {
      if (catFilter.has(key)) catFilter.delete(key); else catFilter.add(key);
      b.classList.toggle('active');
      render();
    };
    wrap.appendChild(b);
  });
})();

document.querySelectorAll('#type-filters .chip').forEach(chip => {
  chip.onclick = () => {
    typeFilter = chip.dataset.tf;
    document.querySelectorAll('#type-filters .chip').forEach(c => c.classList.toggle('active', c === chip));
    render();
  };
});

// ===========================================================================
// Modal — shared by Add (no id) and Edit (existing id).
// ===========================================================================
const modal = {
  scrim:  document.getElementById('modal-scrim'),
  title:  document.getElementById('modal-title'),
  mTitle: document.getElementById('m-title'),
  seg:    document.getElementById('m-typeseg'),
  cat:    document.getElementById('m-cat'),
  imp:    document.getElementById('m-imp'),
  fldImp: document.getElementById('m-fld-imp'),
  fldDue: document.getElementById('m-fld-due'),
  fldEnd: document.getElementById('m-fld-end'),
  lblDue: document.getElementById('m-lbl-due'),
  due:    document.getElementById('m-due'),
  end:    document.getElementById('m-end'),
  body:   document.getElementById('m-body'),
  save:   document.getElementById('modal-save'),
};
let editingId = null;   // null = adding
let modalType = 'task';

function setModalType(t) {
  modalType = t;
  modal.seg.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.type === t));
  // importance only for task/initiative; end date only for trip
  modal.fldImp.style.display = (t === 'task' || t === 'initiative') ? 'flex' : 'none';
  modal.fldEnd.style.display = (t === 'trip') ? 'flex' : 'none';
  modal.lblDue.textContent = t === 'trip' ? 'Start' : (t === 'milestone' ? 'Date' : 'Due');
}
modal.seg.querySelectorAll('button').forEach(b => {
  b.onclick = () => setModalType(b.dataset.type);
});

function openModal() { modal.scrim.classList.add('open'); setTimeout(() => modal.mTitle.focus(), 30); }
function closeModal() { modal.scrim.classList.remove('open'); editingId = null; }

function openAdd() {
  editingId = null;
  modal.title.textContent = 'New item';
  modal.save.textContent = 'Add item';
  modal.mTitle.value = '';
  modal.cat.value = '';
  modal.imp.value = '3';
  modal.due.value = isoToday(7);
  modal.end.value = '';
  modal.body.value = '';
  setModalType('task');
  openModal();
}

function openEdit(id) {
  const it = items.find(x => x.id === id) || doneItems.find(x => x.id === id);
  if (!it) return;
  editingId = id;
  modal.title.textContent = 'Edit item';
  modal.save.textContent = 'Save changes';
  modal.mTitle.value = it.title || '';
  modal.cat.value = it.category || '';
  modal.imp.value = it.importance != null ? String(it.importance) : '3';
  modal.body.value = it.body || '';
  if (it.type === 'trip') {
    modal.due.value = (it.start_date || '').slice(0,10);
    modal.end.value = (it.due_date || '').slice(0,10);
  } else {
    modal.due.value = (it.due_date || '').slice(0,10);
    modal.end.value = '';
  }
  setModalType(it.type);
  openModal();
}

async function saveModal() {
  const title = modal.mTitle.value.trim();
  if (!title) { modal.mTitle.focus(); return; }
  const payload = {
    title,
    type: modalType,
    category: modal.cat.value || null,
    body: modal.body.value.trim() || null,
    due: modal.due.value || null,
    end: modalType === 'trip' ? (modal.end.value || null) : null,
    importance: (modalType === 'task' || modalType === 'initiative') ? modal.imp.value : null,
  };
  if (editingId != null) payload.id = editingId;
  modal.save.disabled = true;
  try {
    const res = await fetch('/api/tasks', {
      method: editingId != null ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error((await res.json()).error || res.status);
    closeModal();
    await load();
  } catch (err) {
    alert('Could not save: ' + (err.message || err));
  } finally {
    modal.save.disabled = false;
  }
}

document.getElementById('open-add').onclick = openAdd;
document.getElementById('modal-close').onclick = closeModal;
document.getElementById('modal-cancel').onclick = closeModal;
modal.save.onclick = saveModal;
modal.scrim.onclick = (e) => { if (e.target === modal.scrim) closeModal(); };
modal.mTitle.addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.scrim.classList.contains('open')) closeModal(); });

document.getElementById('done-toggle').onclick = () => {
  const list = document.getElementById('done-list');
  const ch = document.getElementById('done-chev');
  const isOpen = list.style.display !== 'none';
  list.style.display = isOpen ? 'none' : 'block';
  ch.className = isOpen ? 'ti ti-chevron-right' : 'ti ti-chevron-down';
};

const PANELS = ['list','notes','clusters','agent'];
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    const t = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === tab));
    PANELS.forEach(p => { document.getElementById('panel-'+p).style.display = p === t ? 'block' : 'none'; });
    if (t === 'clusters') Orbit.activate();
  };
});

load();
</script>
</body>
</html>
