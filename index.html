<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>lifeweb</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #11100e;
    --bg-grid: #1c1a17;
    --ink: #ece6da;
    --ink-dim: #8c857a;
    --hex-fill: #1a1815;
    --hex-stroke: #3a352d;
    --accent: #c4783f;
    --accent-soft: #6b4427;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Fraunces', serif;
    overflow: hidden;
  }

  /* The infinite canvas surface — pannable */
  #canvas {
    position: absolute;
    inset: 0;
    cursor: grab;
    background-color: var(--bg);
    background-image:
      radial-gradient(circle at 1px 1px, var(--bg-grid) 1.5px, transparent 0);
    background-size: 38px 38px;
  }
  #canvas:active { cursor: grabbing; }

  /* The world layer that actually moves when you pan */
  #world {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0;
    height: 0;
    will-change: transform;
  }

  /* A node sits centered on its (x,y) world coordinate */
  .node {
    position: absolute;
    transform: translate(-50%, -50%);
    user-select: none;
  }

  /* Hex shape via clip-path */
  .hex {
    width: 200px;
    height: 220px;
    background: var(--hex-fill);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform 0.18s ease, filter 0.18s ease;
  }
  .hex::before {
    content: "";
    position: absolute;
    inset: 2px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background:
      linear-gradient(160deg, rgba(196,120,63,0.06), transparent 60%),
      var(--hex-fill);
    border: 0;
    box-shadow: inset 0 0 0 1.5px var(--hex-stroke);
    z-index: 0;
  }
  .hex:hover {
    transform: scale(1.03);
    filter: drop-shadow(0 8px 28px rgba(0,0,0,0.5));
  }

  .hex-inner {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 32px;
  }
  .hex-inner .plus {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 34px;
    color: var(--accent);
    line-height: 1;
  }
  .hex-inner .label {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    text-transform: lowercase;
  }

  /* Top-left wordmark */
  #brand {
    position: fixed;
    top: 22px;
    left: 26px;
    z-index: 10;
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    pointer-events: none;
  }
  #brand .dot { color: var(--accent); }

  /* Bottom hint */
  #hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--ink-dim);
    pointer-events: none;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div id="brand">lifeweb<span class="dot">.</span></div>

  <div id="canvas">
    <div id="world">
      <!-- Single placeholder hex at world origin -->
      <div class="node" style="left: 0px; top: 0px;">
        <div class="hex">
          <div class="hex-inner">
            <div class="plus">+</div>
            <div class="label">add a widget</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="hint">drag to pan · widgets &amp; data coming next</div>

<script>
  // Minimal pan logic for the world layer. No data, no widgets yet —
  // just enough that the canvas feels like a canvas.
  (function () {
    const world = document.getElementById('world');
    const canvas = document.getElementById('canvas');
    let ox = 0, oy = 0;          // current world offset
    let sx = 0, sy = 0;          // pointer start
    let dragging = false;

    function apply() {
      world.style.transform = `translate(${ox}px, ${oy}px)`;
    }

    canvas.addEventListener('pointerdown', (e) => {
      dragging = true;
      sx = e.clientX - ox;
      sy = e.clientY - oy;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      ox = e.clientX - sx;
      oy = e.clientY - sy;
      apply();
    });
    canvas.addEventListener('pointerup', () => { dragging = false; });
    canvas.addEventListener('pointercancel', () => { dragging = false; });

    apply();
  })();
</script>
</body>
</html>
